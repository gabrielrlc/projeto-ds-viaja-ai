services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:adminpassword@db:5432/viajaai_db
      - DATABASE_URL_SYNC=postgresql://admin:adminpassword@db:5432/viajaai_db
      - GEMINI_API_KEY=AIzaSyBhcxuDUe7nK2iHBhU5d7BAXDiDbAEx8Ks
      - REDIS_URL=redis://redis:6379
      - WATCHFILES_FORCE_POLLING=true

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: viajaai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
